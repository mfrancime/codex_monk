# k8s_sched_pileup — SCHEDULER FRONT (k8s_api / K via deployments.degraded).
# "Pending Pile-up"
#
# Red Team move: a taint/affinity mistake leaves the scheduler unable to place
# pods, so degraded Deployments (replicas wanted > replicas ready) climb from 0
# to 5. Workloads aren't getting capacity. Blue must page WARN CLUSTER_DEGRADED.
name: k8s_sched_pileup
domain: k8s_api
ticks_total: 80

phases:
