# k8s_etcd_splitbrain — ETCD FRONT (k8s_api / K via latency).  "Split Brain"
#
# Red Team escalation: a network partition costs etcd its quorum — the
# remaining members can't commit, and apiserver round-trips balloon to 8000ms
# while it retries leader election. The control plane is effectively frozen:
# CRITICAL GATE_DOWN within 3 ticks. Blue's CRIT-latency rule must outrank its
# WARN-latency rule.
name: k8s_etcd_splitbrain
domain: k8s_api
ticks_total: 80

phases:
  - name: quorum_ok
    range: [0, 49]
    frame:
      k8s.api.healthy: 1
      k8s.api.latency_ms: 25
      k8s.nodes.total: 5
      k8s.nodes.not_ready: 0
      k8s.events.warnings_60s: 0
      k8s.deployments.degraded: 0
      k8s.api.auth_present: 1
    truth: null

  - name: quorum_lost
    range: [50, 79]
    frame:
      k8s.api.healthy: 1
      k8s.api.latency_ms: 8000
      k8s.nodes.total: 5
      k8s.nodes.not_ready: 2
      k8s.events.warnings_60s: 30
      k8s.deployments.degraded: 6
      k8s.api.auth_present: 1
    truth: { sev: CRITICAL, code: GATE_DOWN }
    deadline_ticks: 3
