# k8s_api_down — CONTROL-PLANE FRONT (k8s_api / K). The decapitation strike.
#
# Red Team escalation: the apiserver itself goes dark — k8s.api.healthy flips
# to 0 (every downstream count zeros out because the probe can't reach the
# control plane). This is the worst control-plane state: Blue must page
# CRITICAL GATE_DOWN within 3 ticks, and that CRIT rule must dominate the
# node-not-ready WARN rule.
name: k8s_api_down
domain: k8s_api
ticks_total: 80

phases:
  - name: healthy
    range: [0, 49]
    frame:
      k8s.api.healthy: 1
      k8s.api.latency_ms: 18
      k8s.nodes.total: 5
      k8s.nodes.not_ready: 0
      k8s.events.warnings_60s: 0
      k8s.deployments.degraded: 0
      k8s.api.auth_present: 1
    truth: null

  - name: apiserver_down
    range: [50, 79]
    frame:
      k8s.api.healthy: 0
      k8s.api.latency_ms: 5000
      k8s.nodes.total: 0
      k8s.nodes.not_ready: 0
      k8s.events.warnings_60s: 0
      k8s.deployments.degraded: 0
      k8s.api.auth_present: 1
    truth: { sev: CRITICAL, code: GATE_DOWN }
    deadline_ticks: 3
