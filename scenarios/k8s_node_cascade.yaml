# k8s_node_cascade — NODES FRONT (k8s_api / K).  "Cascade Drain"
#
# Red Team escalation: a bad rollout poisons the kubelet on node after node —
# 3 of 5 nodes flip NotReady at once. One missing node is a WARN; losing the
# majority is a CRITICAL NODE_NOT_READY (pods have nowhere left to land). Blue's
# CRIT rule must dominate its single-node WARN rule.
name: k8s_node_cascade
domain: k8s_api
ticks_total: 80

phases:
  - name: all_ready
    range: [0, 49]
    frame:
      k8s.api.healthy: 1
      k8s.api.latency_ms: 22
      k8s.nodes.total: 5
      k8s.nodes.not_ready: 0
      k8s.events.warnings_60s: 1
      k8s.deployments.degraded: 0
      k8s.api.auth_present: 1
    truth: null

  - name: majority_down
    range: [50, 79]
    frame:
      k8s.api.healthy: 1
      k8s.api.latency_ms: 60
      k8s.nodes.total: 5
      k8s.nodes.not_ready: 3
      k8s.events.warnings_60s: 14
      k8s.deployments.degraded: 4
      k8s.api.auth_present: 1
    truth: { sev: CRITICAL, code: NODE_NOT_READY }
    deadline_ticks: 3
