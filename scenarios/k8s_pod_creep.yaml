# k8s_pod_creep — PODS FRONT (cgroup_pods / Π).
#
# Red Team move: a single pod's working set creeps up until memory.pressure
# (psi.some avg10) climbs from a healthy 3 to a pressured 12. Blue must page
# WARN POD_PRESSURE within 5 ticks of the climb, and stay silent on the calm
# baseline.
#
# Frame keys are the literal cgroup_pods Frame keys (Πs → pod.max.psi_some_avg10).
name: k8s_pod_creep
domain: cgroup_pods
ticks_total: 80

phases:
  - name: healthy
    range: [0, 49]
    frame:
      pod.max.psi_some_avg10: 3.0
      pod.max.psi_full_avg10: 0.0
      pod.delta.oom_kills_60s: 0
      pod.count: 6
      pod.count_pressured: 0
      pod.cgroup_root: 1
    truth: null

  - name: pressure
    range: [50, 79]
    frame:
      pod.max.psi_some_avg10: 12.0
      pod.max.psi_full_avg10: 2.0
      pod.delta.oom_kills_60s: 0
      pod.count: 6
      pod.count_pressured: 1
      pod.cgroup_root: 1
    truth: { sev: WARN, code: POD_PRESSURE }
    deadline_ticks: 5
