# ETCD FRONT, NATIVE signals (feed/Σ). Loss of leader = control plane can't commit.
name: k8s_etcd_native_noleader
domain: feed
ticks_total: 80
phases:
  - name: healthy
    range: [0, 49]
    frame: { etcd.has_leader: 1, etcd.fsync_avg_ms: 5, etcd.leader_changes_60s: 0, etcd.db_size_mb: 200, etcd.available: 1 }
    truth: null
  - name: no_leader
    range: [50, 79]
    frame: { etcd.has_leader: 0, etcd.fsync_avg_ms: 30, etcd.leader_changes_60s: 4, etcd.db_size_mb: 200, etcd.available: 1 }
    truth: { sev: CRITICAL, code: GATE_DOWN }
    deadline_ticks: 3
