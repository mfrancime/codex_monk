# k8s_node_notready — CONTROL-PLANE FRONT (k8s_api / K).
#
# Red Team move: a worker node stops posting Ready heartbeats — the apiserver
# is still up, but k8s.nodes.not_ready ticks to 1. Blue must page WARN
# NODE_NOT_READY within 5 ticks and not page while the cluster is all-Ready.
name: k8s_node_notready
domain: k8s_api
ticks_total: 80

phases:
  - name: all_ready
    range: [0, 49]
    frame:
      k8s.api.healthy: 1
      k8s.api.latency_ms: 20
      k8s.nodes.total: 5
      k8s.nodes.not_ready: 0
      k8s.events.warnings_60s: 0
      k8s.deployments.degraded: 0
      k8s.api.auth_present: 1
    truth: null

  - name: node_lost
    range: [50, 79]
    frame:
      k8s.api.healthy: 1
      k8s.api.latency_ms: 35
      k8s.nodes.total: 5
      k8s.nodes.not_ready: 1
      k8s.events.warnings_60s: 3
      k8s.deployments.degraded: 1
      k8s.api.auth_present: 1
    truth: { sev: WARN, code: NODE_NOT_READY }
    deadline_ticks: 5
