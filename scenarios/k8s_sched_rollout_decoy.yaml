# k8s_sched_rollout_decoy — SCHEDULER FRONT (k8s_api / K). DECOY.
#
# Red Team feint: a healthy rolling update briefly holds 2 Deployments in a
# degraded (replicas not yet all ready) state — this is what a NORMAL deploy
# looks like for a few seconds. Paging on it would mean paging on every release.
# A Blue whose degraded threshold drifted to ≤2 fires here → infeasible. Pins
# the scheduler-WARN threshold above 2.
name: k8s_sched_rollout_decoy
domain: k8s_api
ticks_total: 150

phases:
  - name: rolling_update
    range: [0, 149]
    frame:
      k8s.api.healthy: 1
      k8s.api.latency_ms: 28
      k8s.nodes.total: 5
      k8s.nodes.not_ready: 0
      k8s.events.warnings_60s: 9
      k8s.deployments.degraded: 2
      k8s.api.auth_present: 1
    truth: null
